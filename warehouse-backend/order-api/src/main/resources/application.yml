server:
  port: 8081

spring:
  datasource:
    url: jdbc:hsqldb:file:./db/warehouseDB;shutdown=true
    username: SA
    password:
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false