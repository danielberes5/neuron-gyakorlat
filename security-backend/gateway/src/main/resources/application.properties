# Server port
server.port=8080

# Datasource / JPA
spring.datasource.url=jdbc:hsqldb:file:./db/warehouseDB;shutdown=true
spring.datasource.username=SA
spring.datasource.password=
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
spring.security.jwt.secret=mySuperSecretKeyForJWTGeneration
spring.security.jwt.access-token-exp-ms=900000
spring.security.jwt.refresh-token-exp-ms=10800000